<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interview Sense</title>
  <style>
    body { width: 320px; padding: 24px; font-family: system-ui, -apple-system, sans-serif; background: #050505; color: white; margin: 0; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 9999px; margin-bottom: 16px; }
    .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
    .badge-text { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
    h2 { margin-top: 0; margin-bottom: 12px; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
    p { color: #94a3b8; font-size: 13px; line-height: 1.5; margin-bottom: 24px; font-weight: 500; }
    button { 
      background: #4f46e5; color: white; border: none; padding: 16px; 
      width: 100%; border-radius: 12px; font-weight: 900; font-size: 11px;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
    }
    button:hover { background: #4338ca; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .status { margin-top: 16px; font-size: 11px; font-weight: 700; color: #10b981; display: none; text-align: center; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="badge">
    <div class="dot"></div>
    <span class="badge-text">Terminal Link Active</span>
  </div>
  <h2>Interview<span style="color:#6366f1; font-style:italic;">Sense</span> AI</h2>
  <p>Extract the technical requirements from this job posting to instantly boot up a custom AI simulation.</p>
  <button id="extractBtn">Extract & Initialize →</button>
  <div id="status" class="status">Scanning DOM Matrix...</div>
  <script src="popup.js"></script>
</body>
</html>
